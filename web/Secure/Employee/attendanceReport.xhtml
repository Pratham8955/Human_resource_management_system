<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Attendance List</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">
                <f:view>
                    <div class="container mt-5">
                        <h:form>
                            <h1 class="text-center mb-4">
                                <h:outputText value="Attendance List" />
                            </h1>
                            <div class="table-responsive">
                                <h:dataTable value="#{employeeCdiBean.showAttendance()}" var="item" class="table table-striped table-bordered">
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Dept Name" />
                                        </f:facet>
                                        <h:outputText value="#{item.deptName}" />
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Time In" />
                                        </f:facet>
                                        <h:outputText value="#{item.timeIn}">
                                            <f:convertDateTime pattern="HH:mm:ss" />
                                        </h:outputText>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Time Out" />
                                        </f:facet>
                                        <h:outputText value="#{empty item.timeOut ? '-' : item.timeOut}">
                                            <f:convertDateTime pattern="HH:mm:ss" />
                                        </h:outputText>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Punch Date" />
                                        </f:facet>
                                        <h:outputText value="#{item.punchDate}" >
                                            <f:convertDateTime pattern="MM/dd/yyyy" timeZone="UTC"/>
                                        </h:outputText>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="AId" />
                                        </f:facet>
                                        <h:outputText value="#{item.AId}" />
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Hrmsemployees" />
                                        </f:facet>
                                        <h:outputText value="#{item.hrmsemployees.empFirstname}" />
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Action" />
                                        </f:facet>
                                        <h:form>
                                            <h:commandButton value="Time Out" action="#{employeeCdiBean.TimeOut(item)}" class="btn btn-primary btn-sm" />
                                        </h:form>
                                    </h:column>
                                </h:dataTable>
                            </div>
                        </h:form>
                    </div>
                </f:view>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
