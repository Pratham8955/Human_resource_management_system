<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Specific Training List</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">
                <f:view>
                    <div class="container mt-5">
                        <h:form>
                            <h1 class="text-center mb-4">
                                <h:outputText value="Specific Training List" />
                            </h1>
                            <div class="table-responsive">
                                <h:dataTable value="#{employeeCdiBean.SpecificTrainingForEmployee()}" var="item" class="table table-striped table-bordered">
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Time Duration" />
                                        </f:facet>
                                        <h:outputText value="#{item.timeDuration}" />
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Description" />
                                        </f:facet>
                                        <h:outputText value="#{item.description}" />
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Training ID" />
                                        </f:facet>
                                        <h:outputText value="#{item.trainingId}" />
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Training Description" />
                                        </f:facet>
                                        <h:outputText value="#{item.TId.description}" />
                                    </h:column>
                                </h:dataTable>
                            </div>
                        </h:form>
                    </div>
                </f:view>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
