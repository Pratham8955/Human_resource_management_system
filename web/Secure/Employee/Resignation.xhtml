<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Employee Resignation</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    </h:head>
    <h:body>
        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">

                <div class="container mt-4">
                    <h2 class="mb-4 text-center">Employee Resignation Form</h2>

                    <h:form id="resignationForm" class="needs-validation">

                        <div class="row">
                            <!-- Employee ID -->
                            <div class="col-md-6 mb-3">
                                <label for="empId" class="form-label">Employee ID:</label>
                                <h:inputText id="empId" value="#{employeeCdiBean.userid}" required="true" class="form-control" />
                            </div>

                            <!-- First Name -->
                            <div class="col-md-6 mb-3">
                                <label for="empFirstname" class="form-label">First Name:</label>
                                <h:inputText id="empFirstname" value="#{employeeCdiBean.empFirstname}" required="true" class="form-control" />
                            </div>
                        </div>

                        <div class="row">
                            <!-- Last Name -->
                            <div class="col-md-6 mb-3">
                                <label for="empLastname" class="form-label">Last Name:</label>
                                <h:inputText id="empLastname" value="#{employeeCdiBean.empLastname}" required="true" class="form-control" />
                            </div>

                            <!-- Date of Resignation -->
                            <div class="col-md-6 mb-3">
                                <label for="dateOfResign" class="form-label">Date of Resignation:</label>
                                <p:datePicker id="dateOfResign" value="#{employeeCdiBean.dateOfResign}" pattern="yyyy-MM-dd" 
                                              placeholder="Select Date" class="form-control" />
                            </div>
                        </div>

                        <div class="row">
                            <!-- Reason -->
                            <div class="col-md-6 mb-3">
                                <label for="resignReason" class="form-label">Reason:</label>
                                <h:inputTextarea id="resignReason" value="#{employeeCdiBean.resignReason}" rows="3" class="form-control" />
                            </div>

                            <!-- Feedback -->
                            <div class="col-md-6 mb-3">
                                <label for="feedback" class="form-label">Feedback:</label>
                                <h:inputTextarea id="feedback" value="#{employeeCdiBean.feedback}" rows="3" class="form-control" />
                            </div>
                        </div>

                        <div class="row">
                            <!-- Company Property Return -->
                            <div class="col-md-6 mb-3">
                                <label for="companyPropertyReturn" class="form-label">Company Property Returned:</label>
                                <h:selectOneMenu id="companyPropertyReturn" value="#{employeeCdiBean.companyPropertyReturn}" class="form-select">
                                    <f:selectItem itemLabel="Yes" itemValue="true" />
                                    <f:selectItem itemLabel="No" itemValue="false" />
                                </h:selectOneMenu>
                            </div>

                            <!-- Manager Name -->
                            <div class="col-md-6 mb-3">
                                <label for="managerName" class="form-label">Manager Name:</label>
                                <h:selectOneMenu id="managerName" value="#{employeeCdiBean.manager}" class="form-select">
                                    <f:selectItem itemLabel="-- Select a Manager --" itemValue="" />
                                    <f:selectItems value="#{employeeCdiBean.getSpecificManagers()}" var="manager"
                                                   itemLabel="#{manager.managerName}" itemValue="#{manager.managerName}" />
                                </h:selectOneMenu>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-flex justify-content-end">
                            <h:commandButton value="Submit Resignation" action="#{employeeCdiBean.Resignation()}" 
                                             class="btn btn-danger" />
                        </div>

                    </h:form>
                </div>


            </ui:define>
        </ui:composition>
    </h:body>
</html>
