<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:head>
        <title>Task Management</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    </h:head>

    <h:body>
        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">

                <div class="container mt-5">
                    <h:form id="taskForm">
                        <div class="row mb-3">
                            <label for="userid" class="col-sm-3 col-form-label">User ID:</label>
                            <div class="col-sm-9">
                                <h:inputText id="userid" value="#{employeeCdiBean.userid}" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="empFirstname" class="col-sm-3 col-form-label">Employee Name:</label>
                            <div class="col-sm-9">
                                <h:inputText id="empFirstname" value="#{employeeCdiBean.empFirstname}" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="entrydate" class="col-sm-3 col-form-label">Entry Date:</label>
                            <div class="col-sm-9">
                                <h:inputText id="entrydate" value="#{employeeCdiBean.entrydate}" class="form-control">
                                    <f:convertDateTime pattern="yyyy-MM-dd" />
                                </h:inputText>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="task" class="col-sm-3 col-form-label">Task:</label>
                            <div class="col-sm-9">
                                <h:inputText id="task" value="#{employeeCdiBean.task}" class="form-control" />
                            </div>
                        </div>

                        <div class="row mb-3">
                            <label for="actiontime" class="col-sm-3 col-form-label">Action Time:</label>
                            <div class="col-sm-9">
                                <h:inputText id="actiontime" value="#{employeeCdiBean.actiontime}" class="form-control" />
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-sm-12 text-end">
                                <h:commandButton value="Save" action="#{employeeCdiBean.AddTask()}" class="btn btn-primary" />
                            </div>
                        </div>
                    </h:form>
                </div>

            </ui:define>
        </ui:composition>
    </h:body>

</html>
