<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Leave List</title>
        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">

                <f:view>
                    <div class="container mt-5">
                        <h1 class="text-center mb-4">Leave List</h1>

                        <!-- Responsive Table -->
                        <h:form>
                            <div class="table-responsive">
                                <h:dataTable value="#{employeeCdiBean.leaveList()}" var="item" styleClass="table table-bordered table-hover table-striped">
                                    <!-- Status Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Status" />
                                        </f:facet>
                                        <h:outputText value="#{empty item.status ? 'Pending' :item.status }" />
                                    </h:column>

                                    <!-- Application ID Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Application ID" />
                                        </f:facet>
                                        <h:outputText value="#{item.applicationId}" />
                                    </h:column>

                                    <!-- Request Date Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Request Date" />
                                        </f:facet>
                                        <h:outputText value="#{item.requestDate}">
                                            <f:convertDateTime pattern="MM/dd/yyyy" />
                                        </h:outputText>
                                    </h:column>

                                    <!-- Leave Type Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Leave Type" />
                                        </f:facet>
                                        <h:outputText value="#{item.leaveType}" />
                                    </h:column>

                                    <!-- Leave Duration Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Leave Duration" />
                                        </f:facet>
                                        <h:outputText value="#{item.leaveDuration}" />
                                    </h:column>

                                    <!-- From Date Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="From Date" />
                                        </f:facet>
                                        <h:outputText value="#{item.fromDate}">
                                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                                        </h:outputText>
                                    </h:column>

                                    <!-- To Date Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="To Date" />
                                        </f:facet>
                                        <h:outputText value="#{item.toDate}">
                                            <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                                        </h:outputText>
                                    </h:column>

                                    <!-- Reason Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Reason" />
                                        </f:facet>
                                        <h:outputText value="#{item.reason}" />
                                    </h:column>

                                    <!-- Manager Name Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Manager Name" />
                                        </f:facet>
                                        <h:outputText value="#{item.managerName}" /> 
                                    </h:column>
                                </h:dataTable>
                            </div>
                        </h:form>
                    </div>
                </f:view>
            </ui:define>
        </ui:composition>

        <!-- Bootstrap 5 JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </h:body>
</html>
