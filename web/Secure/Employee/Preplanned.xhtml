<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Responsive Leave Application Form</title>
        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <style>
            /* Custom CSS for better spacing and alignment */
            .form-container {
                max-width: 800px;
                margin: 0 auto;
            }
            .card-header {
                text-align: center;
            }
        </style>
    </h:head>
    <h:body>
<!--        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">-->
                <div class="container mt-4">
                    <div class="card shadow form-container">
                        <div class="card-header bg-primary text-white">
                            <h4>Leave Application Form</h4>
                        </div>
                        <div class="card-body">
                            <!-- Leave Application Form -->
                            <h:form>
                                <div class="row gy-3">
                                    <!-- User ID -->
                                    <div class="col-md-6 col-sm-12">
                                        <h:outputLabel for="userId" value="Employee ID:" class="form-label" />
                                        <h:inputText id="userId" value="#{employeeCdiBean.userid}" class="form-control" />
                                    </div>

                                    <div class="col-md-6">
                                        <h:outputLabel for="requestDate" value="Request Date:" class="form-label" />
                                        <p:datePicker id="requestDate" value="#{employeeCdiBean.requestdate}" mindate="#{datetime.currentDate}" pattern="yyyy-MM-dd" showIcon="true" class="form-control calendar-datepicker" />
                                    </div>

                                    <!-- Leave Type -->
                                    <div class="col-md-6 col-sm-12">
                                        <h:outputLabel for="leaveType" value="Leave Type:" class="form-label" />
                                        <h:selectOneMenu id="leaveType" value="#{employeeCdiBean.leavetype}" class="form-select">
                                            <f:selectItem itemLabel="Select Leave Type" itemValue="" />
                                            <f:selectItem itemLabel="Preplanned" itemValue="Preplanned" />
                                        </h:selectOneMenu>
                                    </div>

                                    <!-- Leave Duration -->
                                    <div class="col-md-6 col-sm-12">
                                        <h:outputLabel for="leaveDuration" value="Leave Duration:" class="form-label" />
                                        <h:selectOneMenu id="leaveDuration" value="#{employeeCdiBean.leaveduration}" class="form-select">
                                            <f:selectItem itemLabel="Select Leave Duration" itemValue="" />
                                            <f:selectItem itemLabel="Short Leave" itemValue="Short Leave" />
                                            <f:selectItem itemLabel="Full Leave" itemValue="Full Leave" />
                                        </h:selectOneMenu>
                                    </div>

                                    <!-- From Date -->
                                    <div class="col-md-6 col-sm-12">
                                        <h:outputLabel for="fromDate" value="From Date:" class="form-label" />
                                        <p:datePicker id="fromDate" value="#{employeeCdiBean.fromdate}" pattern="yyyy-MM-dd" 
                                                      mindate="#{datetime.currentDate}"  showIcon="true" class="form-control" />
                                    </div>

                                    <!-- To Date -->
                                    <div class="col-md-6 col-sm-12">
                                        <h:outputLabel for="toDate" value="To Date:" class="form-label" />
                                        <p:datePicker id="toDate" value="#{employeeCdiBean.todate}" pattern="yyyy-MM-dd"
                                                      mindate="#{datetime.currentDate}"  showIcon="true" class="form-control" />
                                    </div>

                                    <!-- Manager Name -->
                                    <div class="col-md-6 col-sm-12">
                                        <h:outputLabel for="managerName" value="Manager Name:" class="form-label" />
                                        <h:selectOneMenu id="managerName" value="#{employeeCdiBean.managername}" class="form-select">
                                            <f:selectItem itemLabel="-- Select a Manager --" itemValue="" />
                                            <f:selectItems value="#{employeeCdiBean.getSpecificManagers()}" var="manager"
                                                           itemLabel="#{manager.managerName}" itemValue="#{manager.managerName}" />
                                        </h:selectOneMenu>
                                    </div>

                                    <!-- Reason -->
                                    <div class="col-md-12">
                                        <h:outputLabel for="reason" value="Reason:" class="form-label" />
                                        <h:inputTextarea id="reason" value="#{employeeCdiBean.reason}" rows="3" class="form-control" />
                                    </div>

                                    <!-- Submit Button -->
                                    <div class="col-12 text-center">
                                        <h:commandButton value="Submit" action="#{employeeCdiBean.AddPreplannedLeave()}" class="btn btn-primary" />
                                    </div>
                                    <!-- Display Faces Messages (Success, Error, or Info Messages) -->
                                    <h:messages globalOnly="true" showDetail="true" />
                                </div>
                            </h:form>
                        </div>
                    </div>
                </div>

                <!-- Bootstrap 5 JS Bundle -->
<!--            </ui:define>
        </ui:composition>-->
    </h:body>
</html>
