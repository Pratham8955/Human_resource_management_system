<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Resignation List</title>
        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">

                <f:view>
                    <div class="container mt-5">
                        <h1 class="text-center mb-4">Resignation List</h1>

                        <!-- Responsive Table -->
                        <h:form>
                            <div class="table-responsive">
                                <h:dataTable value="#{employeeCdiBean.showResignation()}" var="item" styleClass="table table-bordered table-hover table-striped">
                                    <!-- Status Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Status" />
                                        </f:facet>
                                        <h:outputText value="#{empty item.status ? 'Pending' : item.status}" />
                                    </h:column>

                                    <!-- Emp Firstname Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Emp Firstname" />
                                        </f:facet>
                                        <h:outputText value="#{item.empFirstname}" />
                                    </h:column>

                                    <!-- Emp Lastname Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Emp Lastname" />
                                        </f:facet>
                                        <h:outputText value="#{item.empLastname}" />
                                    </h:column>

                                    <!-- Date of Resign Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Date of Resign" />
                                        </f:facet>
                                        <h:outputText value="#{item.dateOfResign}">
                                            <f:convertDateTime pattern="MM/dd/yyyy" />
                                        </h:outputText>
                                    </h:column>

                                    <!-- Reason Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Reason" />
                                        </f:facet>
                                        <h:outputText value="#{item.reason}" />
                                    </h:column>

                                    <!-- Feedback Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Feedback" />
                                        </f:facet>
                                        <h:outputText value="#{item.feedback}" />
                                    </h:column>

                                    <!-- Company Property Return Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Company Property Return" />
                                        </f:facet>
                                        <h:outputText value="#{item.companyPropertyReturn}" />
                                    </h:column>

                                    <!-- Manager Name Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Manager Name" />
                                        </f:facet>
                                        <h:outputText value="#{item.manager}" />
                                    </h:column>

                                    <!-- Resignation ID Column -->
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Resignation ID" />
                                        </f:facet>
                                        <h:outputText value="#{item.resigId}" />
                                    </h:column>

                                </h:dataTable>
                            </div>
                        </h:form>
                    </div>
                </f:view>
            </ui:define>
        </ui:composition>

        <!-- Bootstrap 5 JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </h:body>
</html>
