<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:head>
        <title>Attendance Form</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Add Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    </h:head>

    <h:body>
<!--        <ui:composition template="newTemplate1.xhtml">
            <ui:define name="content">-->
                <h:form>
                    <div class="container mt-5">
                        <div class="row justify-content-center">
                            <div class="col-md-6">
                                <div class="card shadow-lg">
                                    <div class="card-body">
                                        <h5 class="card-title text-center mb-4">Attendance</h5>

                                        <!-- Employee ID -->
                                        <div class="mb-3">
                                            <label for="employeeId" class="form-label">Employee ID</label>
                                            <h:inputText id="employeeId" value="#{employeeCdiBean.atten_userid}" 
                                                         styleClass="form-control" />
                                        </div>

                                        <!-- Department Name -->
                                        <div class="mb-3">
                                            <label for="departmentName" class="form-label">Department Name</label>
                                            <h:inputText id="departmentName" value="#{employeeCdiBean.atten_dep_name}" 
                                                         styleClass="form-control" />
                                        </div>

                                        <!-- Time In -->
                                        <div class="mb-3">
                                            <label for="timeIn" class="form-label">Time In</label>
                                            <h:inputText id="timeIn" value="#{employeeCdiBean.atten_timeIn}" 
                                                         styleClass="form-control" />
                                        </div>

                                        <!-- Punch Date -->
                                        <div class="mb-3">
                                            <label for="punchDate" class="form-label">Punch Date</label>
                                            <p:datePicker id="punchDate" value="#{employeeCdiBean.atten_punch_date}" 
                                                          pattern="yyyy-MM-dd" mindate="#{datetime.currentDate}" maxdate="#{datetime.currentDate}" />
                                        </div>

                                        <!-- Submit Button -->
                                        <h:commandButton value="Add Attendance" action="#{employeeCdiBean.AddAttendance()}"
                                                         styleClass="btn btn-primary w-100" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </h:form>
<!--            </ui:define>
        </ui:composition>-->

        <!-- Add Bootstrap and PrimeFaces JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="assets/js/primefaces.js"></script>
    </h:body>
</html>
