<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
        <ui:composition template="newTemplate2.xhtml">
            <ui:define name="content">
                <f:view>


                    <h:form>
                        <h1><h:outputText value="List of Resignation Applications"/></h1>
                        <div class="table-responsive">
                            <h:dataTable value="#{managerCdiBean.ShowResignationForManager()}" var="item"  styleClass="table table-bordered table-striped table-hover">
                                
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="EmpFirstname"/>
                                    </f:facet>
                                    <h:outputText value="#{item.empFirstname}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="EmpLastname"/>
                                    </f:facet>
                                    <h:outputText value="#{item.empLastname}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="DateOfResign"/>
                                    </f:facet>
                                    <h:outputText value="#{item.dateOfResign}">
                                        <f:convertDateTime pattern="MM/dd/yyyy" />
                                    </h:outputText>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Reason"/>
                                    </f:facet>
                                    <h:outputText value="#{item.reason}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Feedback"/>
                                    </f:facet>
                                    <h:outputText value="#{item.feedback}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="CompanyPropertyReturn"/>
                                    </f:facet>
                                    <h:outputText value="#{item.companyPropertyReturn}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Manager"/>
                                    </f:facet>
                                    <h:outputText value="#{item.manager}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="ResigId"/>
                                    </f:facet>
                                    <h:outputText value="#{item.resigId}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Hrmsemployees"/>
                                    </f:facet>
                                    <h:outputText value="#{item.hrmsemployees.empFirstname}"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Status"/>
                                    </f:facet>
                                    <h:outputText value="#{empty item.status ? 'Pending' :item.status }"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Set Status"/>
                                    </f:facet>
                                    <h:selectOneMenu value="#{item.status}">
                                        <f:selectItem itemValue="Pending" itemLabel="Pending" />
                                        <f:selectItem itemValue="Approved" itemLabel="Approved" />
                                    </h:selectOneMenu>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Actions" />
                                    </f:facet>
                                    <h:commandButton value="Approve" 
                                                     action="#{managerCdiBean.approveResignation(item)}"
                                                     styleClass="btn btn-success btn-sm" />
                                </h:column>
                            </h:dataTable>
                        </div>
                    </h:form>
                </f:view>

            </ui:define>
        </ui:composition>
    </h:body>
</html>
