<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Facelet Title</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate2.xhtml">
            <ui:define name="content">
                <f:view>
                    <h:form>
                        <h1><h:outputText value="List of Leave Applications" /></h1>

                        <!-- Responsive wrapper -->
                        <div class="table-responsive">
                            <h:dataTable value="#{managerCdiBean.ShowLeaveForManager()}" var="item" 
                                         styleClass="table table-bordered table-striped table-hover">

                                <!-- Status Column -->
                                

                                <!-- ApplicationId Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Application ID" />
                                    </f:facet>
                                    <h:outputText value="#{item.applicationId}" />
                                </h:column>

                                <!-- Request Date Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Request Date" />
                                    </f:facet>
                                    <h:outputText value="#{item.requestDate}">
                                        <f:convertDateTime pattern="MM/dd/yyyy" />
                                    </h:outputText>
                                </h:column>

                                <!-- Leave Type Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Leave Type" />
                                    </f:facet>
                                    <h:outputText value="#{item.leaveType}" />
                                </h:column>

                                <!-- Leave Duration Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Leave Duration" />
                                    </f:facet>
                                    <h:outputText value="#{item.leaveDuration}" />
                                </h:column>

                                <!-- From Date Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="From Date" />
                                    </f:facet>
                                    <h:outputText value="#{item.fromDate}">
                                        <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                                    </h:outputText>
                                </h:column>

                                <!-- To Date Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="To Date" />
                                    </f:facet>
                                    <h:outputText value="#{item.toDate}">
                                        <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                                    </h:outputText>
                                </h:column>

                                <!-- Reason Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Reason" />
                                    </f:facet>
                                    <h:outputText value="#{item.reason}" />
                                </h:column>

                                <!-- Manager Name Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Manager Name" />
                                    </f:facet>
                                    <h:outputText value="#{item.managerName}" />
                                </h:column>

                                <!-- Hrmsemployees Column -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Hrmsemployees" />
                                    </f:facet>
                                    <h:outputText value="#{item.hrmsemployees.empFirstname}" />
                                </h:column>

                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Status"/>
                                    </f:facet>
                                    <h:outputText value="#{empty item.status ? 'Pending' :item.status }"/>
                                </h:column>
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Set Status" />
                                    </f:facet>
                                    <!-- Dropdown for status -->
                                    <h:selectOneMenu value="#{item.status}">
                                        <f:selectItem itemValue="Pending" itemLabel="Pending" />
                                        <f:selectItem itemValue="Approved" itemLabel="Approved" />
                                    </h:selectOneMenu>
                                </h:column>
                                <!-- Approve Button -->
                                <h:column>
                                    <f:facet name="header">
                                        <h:outputText value="Actions" />
                                    </f:facet>
                                    <h:commandButton value="Approve" 
                                                     action="#{managerCdiBean.approveLeave(item)}"
                                                     styleClass="btn btn-success btn-sm" />
                                </h:column>
                            </h:dataTable>
                        </div>
                    </h:form>
                </f:view>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
