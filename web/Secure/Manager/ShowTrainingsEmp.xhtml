<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Training Schedule List</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate2.xhtml">
            <ui:define name="content">
                <div class="container mt-5">
                    <!-- Training List Card -->
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title text-center">Training Schedule List</h2>
                        </div>
                        <div class="card-body">
                            <!-- Training Schedule Table -->
                            <h:form>
                                <h:dataTable value="#{managerCdiBean.traingsSheduled}" var="item" class="table table-bordered table-striped">
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Time Duration"/>
                                        </f:facet>
                                        <h:outputText value="#{item.timeDuration}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Description"/>
                                        </f:facet>
                                        <h:outputText value="#{item.description}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Training Id"/>
                                        </f:facet>
                                        <h:outputText value="#{item.trainingId}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Training"/>
                                        </f:facet>
                                        <h:outputText value="#{item.TId.description}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Employee"/>
                                        </f:facet>
                                        <h:outputText value="#{item.userId.empFirstname}"/>
                                    </h:column>
                                </h:dataTable>
                            </h:form>
                        </div>
                    </div>
                </div>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
