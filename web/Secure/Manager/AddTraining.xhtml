<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Add Training</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</h:head>
<h:body>
    <ui:composition template="newTemplate2.xhtml">
        <ui:define name="content">
            <div class="container mt-5">
                <div class="card">
                    <div class="card-header text-black">
                        <h2 class="card-title text-center">Add New Training</h2>
                    </div>
                    <div class="card-body">
                        <!-- Form for adding training -->
                        <h:form>
                            <div class="row mb-3">
                                <!-- Input for Trainer -->
                                <div class="col-md-6">
                                    <h:outputLabel for="managerName" value="Manager Name:" class="form-label" />
                                    <h:selectOneMenu id="managerName" value="#{managerCdiBean.trainer}" class="form-select">
                                        <f:selectItem itemLabel="-- Select a Trainer --" itemValue="" />
                                        <f:selectItems value="#{adminCdiBean.managerNames}" var="manager" 
                                                       itemLabel="#{manager}" itemValue="#{manager}" />
                                    </h:selectOneMenu>
                                </div>

                                <!-- Input for Description -->
                                <div class="col-md-6">
                                    <h:outputLabel for="description" value="Description:" class="form-label" />
                                    <h:inputText id="description" value="#{managerCdiBean.description}" required="true" class="form-control" />
                                </div>
                            </div>

                            <div class="row mb-3">
                                <!-- Input for Status -->
                                <div class="col-md-6">
                                    <h:outputLabel for="status" value="Status:" class="form-label" />
                                    <h:selectOneMenu id="status" value="#{managerCdiBean.status}" class="form-select">
                                        <f:selectItem itemLabel="-- Select Training --" itemValue="" />
                                        <f:selectItem itemLabel="Scheduled" itemValue="Scheduled" />
                                        <f:selectItem itemLabel="Unscheduled" itemValue="Unscheduled" />
                                    </h:selectOneMenu>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="text-center">
                                <h:commandButton value="Add Training" action="#{managerCdiBean.AddTraining()}" class="btn btn-primary" />
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>
        </ui:define>
    </ui:composition>
</h:body>
</html>
