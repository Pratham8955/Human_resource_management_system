<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Add Employee Training</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate2.xhtml">
            <ui:define name="content">
                <div class="container mt-5">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title text-center">Add Employee Training</h2>
                        </div>
                        <div class="card-body">
                            <!-- Form for adding employee training -->
                            <h:form>
                                <!-- Training Selection -->
                                <div class="mb-3">
                                    <h:outputLabel for="training" value="Training:" class="form-label" />
                                    <h:selectOneMenu id="training" value="#{managerCdiBean.training_tid}" class="form-select">
                                        <f:selectItem itemLabel="-- Select a Training --" itemValue="" />
                                        <f:selectItems value="#{managerCdiBean.showTrainingType()}" var="training" 
                                                       itemLabel="#{training.description}" itemValue="#{training.TId}" />
                                    </h:selectOneMenu>
                                </div>

                                <!-- Employee Selection -->
                                <div class="mb-3">
                                    <h:outputLabel for="employee" value="Employee:" class="form-label" />
                                    <h:selectOneMenu id="employee" value="#{managerCdiBean.emp_tid}" class="form-select">
                                        <f:selectItem itemLabel="-- Select an Employee --" itemValue="" />
                                        <f:selectItems value="#{managerCdiBean.getAllTrainingsEmployee()}" var="employee" 
                                                       itemLabel="#{employee.empFirstname}" itemValue="#{employee.userId}" />
                                    </h:selectOneMenu>
                                </div>

                                <!-- Time Duration Input -->
                                <div class="mb-3">
                                    <h:outputLabel for="timeDuration" value="Time Duration:" class="form-label" />
                                    <h:inputText id="timeDuration" value="#{managerCdiBean.timeduration}" required="true" class="form-control" />
                                </div>

                                <!-- Description Input -->
                                <div class="mb-3">
                                    <h:outputLabel for="description" value="Description:" class="form-label" />
                                    <h:inputTextarea id="description" value="#{managerCdiBean.emp_description}" rows="4" cols="50" required="true" class="form-control" />
                                </div>

                                <!-- Submit Button -->
                                <div class="text-center">
                                    <h:commandButton value="Add Training" action="#{managerCdiBean.AddEmpTraining()}" class="btn btn-primary" />
                                </div>
                            </h:form>
                        </div>
                    </div>
                </div>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
