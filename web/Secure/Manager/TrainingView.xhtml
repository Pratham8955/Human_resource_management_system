<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Training List</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    </h:head>
    <h:body>
        <ui:composition template="newTemplate2.xhtml">
            <ui:define name="content">
                <div class="container mt-5">
                    <!-- Add Training Button -->
                    <div class="mb-3">
                        <h:form>
                            <h:commandButton value="Add Training" 
                                             action="#{managerCdiBean.redirectAddTraining()}" 
                                             styleClass="btn btn-success" />
                        </h:form>
                    </div>

                    <!-- Training List Card -->
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title text-center">Training List</h2>
                        </div>
                        <div class="card-body">
                            <!-- Training List Table -->
                            <h:form>
                                <h:dataTable value="#{managerCdiBean.showTrainingType()}" var="item" class="table table-bordered table-striped">
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="TId"/>
                                        </f:facet>
                                        <h:outputText value="#{item.TId}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Trainer"/>
                                        </f:facet>
                                        <h:outputText value="#{item.trainer}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Description"/>
                                        </f:facet>
                                        <h:outputText value="#{item.description}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            <h:outputText value="Status"/>
                                        </f:facet>
                                        <h:outputText value="#{item.status}"/>
                                    </h:column>
                                    <h:column>
                                        <f:facet name="header">
                                            Edit
                                        </f:facet>
                                        <h:form>
                                            <h:commandButton value="Edit"  
                                                             styleClass="btn btn-primary btn-sm"
                                                             action="#{managerCdiBean.SearchTrainingType(item.TId)}"/>
                                        </h:form>
                                    </h:column>

                                    <!-- Delete Button Column -->
                                    <h:column>
                                        <f:facet name="header">Delete</f:facet>
                                        <h:commandButton value="Delete" 
                                                         action="#{managerCdiBean.deleteTrainingType(item.TId)}" 
                                                         styleClass="btn btn-danger btn-sm" immediate="true" />
                                    </h:column>
                                </h:dataTable>
                            </h:form>
                        </div>
                    </div>
                </div>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
