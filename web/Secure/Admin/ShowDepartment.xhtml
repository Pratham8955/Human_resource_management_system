<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
        <ui:composition template="newTemplate.xhtml">
            <ui:define name="content">
                <h:dataTable value="#{adminCdiBean.showDepartment()}" var="dep" class="display table table-striped table-hover">
                    <!-- Department ID Column -->
                    <h:column>
                        <f:facet name="header">
                            Department Id
                        </f:facet>
                        #{dep.depId}
                    </h:column>

                    <!-- Department Name Column -->
                    <h:column>
                        <f:facet name="header">
                            Department Name
                        </f:facet>
                        #{dep.depName}
                    </h:column>

                    <!-- Manager Name Column -->
                    <h:column>
                        <f:facet name="header">
                            Manager Name
                        </f:facet>
                        <h:outputText value="#{empty dep.managerName ? '-' : dep.managerName}" />
                    </h:column>

                    <!-- Edit Button Column -->
                    <h:column>
                        <f:facet name="header">
                            Edit
                        </f:facet>
                        <h:form>
                            <h:commandButton value="Edit" action="#{adminCdiBean.SearchDepartment(dep.depId)}" 
                                             styleClass="btn btn-primary btn-sm" />
                        </h:form>
                    </h:column>

                    <!-- Delete Button Column -->
                    <h:column>
                        <f:facet name="header">
                            Delete
                        </f:facet>
                        <h:form>
                            <h:commandButton value="Delete" action="#{adminCdiBean.deleteDepartment(dep.depId)}" 
                                             styleClass="btn btn-danger btn-sm" />
                        </h:form>
                    </h:column>
                </h:dataTable>
            </ui:define>
        </ui:composition>


    </h:body>
</html>
