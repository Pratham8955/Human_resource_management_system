<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
        <ui:composition template="newTemplate.xhtml">
            <ui:define name="content">
                <div class="container mt-4">
                    <h2 class="mb-4">Edit Department</h2>
                    <h:form class="needs-validation" >
                        <div class="row">
                            <!-- Department Name -->
                            <div class="col-md-6 mb-3">
                                <label for="depName" class="form-label">Department Name:</label>
                                <h:inputText id="depName" value="#{adminCdiBean.depName}" required="true" class="form-control" />
                            </div>

                            <!-- Manager Name -->
                            <div class="col-md-6 mb-3">
                                <label for="managerName" class="form-label">Manager Name:</label>
                                <h:selectOneMenu id="managerName" value="#{adminCdiBean.managerName}" class="form-select">
                                    <f:selectItem itemLabel="-- Select a Manager --" itemValue="" />
                                    <f:selectItems value="#{adminCdiBean.showEmployee()}" var="manager"
                                                   itemLabel="#{manager.empFirstname}" itemValue="#{manager.empFirstname}" />
                                </h:selectOneMenu>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="row">
                            <div class="col-md-12 d-flex justify-content-end">
                                <h:commandButton action="#{adminCdiBean.editDepartment()}" value="Edit" class="btn btn-primary" />
                            </div>
                        </div>
                    </h:form>
                </div>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
