<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
        <ui:composition template="newTemplate.xhtml">
            <ui:define name="content">
                <div class="container mt-5">
                    <div class="page-inner">
                        <h:form>

                            <div class="card shadow">
                                <div class="card-header">
                                    <h4 class="card-title">Add Department</h4>
                                </div>
                                <div class="card-body">
                                   
                                    <div class="form-group">
                                        <h:outputLabel value="Department Name:" for="depName" class="form-label"></h:outputLabel>
                                        <h:inputText id="depName" value="#{adminCdiBean.depName}" class="form-control"/>
                                    </div>

                                  
                                    <div class="form-group mt-3">
                                        <h:outputLabel value="Manager Name:" for="managerName" class="form-label"></h:outputLabel>
                                        <h:selectOneMenu id="managerName" value="#{adminCdiBean.managerName}" class="form-control">
                                            <f:selectItem itemLabel="-- Select a Manager --" itemValue=" " />
                                            <f:selectItems value="#{adminCdiBean.showEmployee()}" var="manager"
                                                           itemLabel="#{manager.empFirstname}" itemValue="#{manager.empFirstname}" />
                                        </h:selectOneMenu>
                                    </div>

                                   
                                    <div class="form-group mt-4">
                                        <h:commandButton action="#{adminCdiBean.addDepartment()}" value="Insert" class="btn btn-primary" />
                                    </div>
                                </div>
                            </div>
                        </h:form>
                    </div>
                </div>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
